name: Terraform CI/CD
on:
  push:
    branches:
      - main
jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::366370784053:role/Role-11
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Convert Plan to JSON
        run: terraform show -json tfplan > tfplan.json

      - name: Debug JSON
        run: head -c 200 tfplan.json

      - name: Install Conftest
        run: |
          VERSION=0.45.0
          wget https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz
          tar xzf conftest_${VERSION}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Policy Check
        run: conftest test tfplan.json --policy ../policy

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
